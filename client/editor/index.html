<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ryre — 편집</title>
  <link rel="stylesheet" href="/shared/styles/slide.css" />
  <link rel="stylesheet" href="/editor/editor.css" />
</head>
<body>
  <header class="topbar">
    <strong class="brand">ryre</strong>
    <select id="service-select" title="예배 순서 선택"></select>
    <button id="new-service">+ 새 예배</button>
    <span class="seg" role="group" aria-label="보기 전환">
      <button id="view-list" class="seg-btn active">리스트</button>
      <button id="view-tiles" class="seg-btn">타일</button>
    </span>
    <span class="spacer"></span>
    <button id="export-btn" title="이 예배 순서를 JSON으로 내보내기">내보내기</button>
    <button id="import-btn" title="JSON에서 예배 순서 가져오기">가져오기</button>
    <input id="import-file" type="file" accept="application/json,.json" hidden />
    <button id="import-ppt" title="PDF·이미지를 슬라이드로 가져오기">슬라이드 가져오기</button>
    <input id="import-ppt-file" type="file" accept="application/pdf,image/*" hidden />
    <label class="theme-pick">테마 <select id="theme-select"></select></label>
    <label class="theme-pick" title="테마 기본 배경색">배경 <input id="bg-color" type="color" /></label>
    <label class="theme-pick" title="메인 강조색">메인 <input id="accent-color" type="color" /></label>
    <button id="theme-reset" class="mini" title="커스텀 색 초기화">색 초기화</button>
    <label class="theme-pick" title="발표 전환 효과">전환
      <select id="transition-select">
        <option value="none">없음</option>
        <option value="fade">페이드</option>
        <option value="slide">슬라이드</option>
      </select>
    </label>
    <a id="open-presenter" href="/presenter" target="_blank" rel="noopener">발표 화면 ↗</a>
  </header>

  <!-- ===== 편집(단일) 뷰 ===== -->
  <main class="layout" id="edit-view">
    <aside class="col order">
      <div class="col-head"><span>순서</span><span id="order-count" class="muted"></span></div>
      <div id="slide-list" class="slide-list"></div>
    </aside>

    <section class="col canvas">
      <div id="tpl-edit-bar" class="tpl-edit-bar" hidden>
        <span>🎨 템플릿 편집 중: <b id="tpl-edit-name"></b> <span class="muted">— 디자인을 바꾼 뒤 저장하세요</span></span>
        <span class="spacer"></span>
        <button id="tpl-edit-save" class="primary-sm">템플릿에 저장</button>
        <button id="tpl-edit-cancel">취소</button>
      </div>
      <div class="canvas-tools">
        <span class="ct-label">요소 추가</span>
        <button data-add="text">＋ 텍스트</button>
        <button data-add="rect">▭ 사각형</button>
        <button data-add="ellipse">◯ 원</button>
        <button data-add="line">／ 선</button>
        <button data-add="image">🖼 이미지</button>
        <span class="ct-sep">|</span>
        <button data-add="bible">📖 성경</button>
        <button data-add="hymn">🎵 찬송</button>
        <button data-add="reading">📜 교독</button>
        <input id="el-image-file" type="file" accept="image/*" hidden />
      </div>
      <div class="canvas-wrap"><div id="preview" class="slide-layers"></div></div>
      <div id="canvas-bar" class="canvas-bar">
        <button id="prev-slide">◀</button>
        <span id="slide-pos" class="slide-pos">—</span>
        <button id="next-slide">▶</button>
        <span class="spacer"></span>
        <button id="present-here" title="이 슬라이드를 발표 화면에 띄움">발표로 보내기</button>
        <button id="del-slide" class="danger">슬라이드 삭제</button>
      </div>
    </section>

    <aside class="col panel">
      <div class="tabs">
        <button class="tab active" data-tab="add">추가</button>
        <button class="tab" data-tab="design">디자인</button>
        <button class="tab" data-tab="template">템플릿</button>
        <button class="tab" data-tab="inspect">검사기</button>
      </div>
      <div id="tab-add" class="tab-body">
        <label>추가할 종류 / 템플릿
          <select id="add-type"></select>
        </label>
        <div id="add-fields" class="fields"></div>
        <button id="add-slide-btn" class="primary">순서 끝에 추가</button>
        <p id="add-msg" class="msg"></p>
      </div>

      <div id="tab-design" class="tab-body" hidden>
        <div class="section-title">선택한 요소</div>
        <div id="el-empty" class="muted">위 “요소 추가”로 만들거나 캔버스에서 요소를 클릭하세요. 성경/찬송/교독 요소도 글자 크기·색·위치를 자유롭게 편집할 수 있습니다.</div>
        <div id="el-props" class="fields" hidden></div>
      </div>

      <div id="tab-template" class="tab-body" hidden>
        <div class="section-title">이 슬라이드</div>
        <button id="tpl-save" class="primary">디자인을 템플릿으로 저장</button>
        <p id="tpl-msg" class="msg"></p>
        <hr />
        <div class="section-title">템플릿 목록 <span class="muted">([✎ 편집]=디자인 수정 · 추가는 ‘추가’ 탭)</span></div>
        <div id="tpl-list" class="tpl-list"></div>
      </div>

      <div id="tab-inspect" class="tab-body" hidden>
        <div id="inspect-empty" class="muted">슬라이드를 선택하세요.</div>
        <div id="inspect-body" hidden>
          <label>슬라이드 배경
            <select id="insp-bg-type">
              <option value="theme">테마 기본</option>
              <option value="color">색</option>
              <option value="gradient">그라데이션</option>
              <option value="image">이미지 URL</option>
              <option value="video">영상 URL</option>
            </select>
          </label>
          <div id="insp-bg-fields" class="fields"></div>
          <button id="insp-save" class="primary">변경 저장</button>
          <p id="insp-msg" class="msg"></p>
        </div>
      </div>
    </aside>
  </main>

  <!-- ===== 타일(전체보기) 뷰 ===== -->
  <section class="tiles-view" id="tiles-view" hidden>
    <p class="tiles-hint muted">클릭·⌘/Ctrl·Shift로 선택 · 드래그로 순서 변경(여럿 함께) · 더블클릭하면 발표로 보냄</p>
    <div id="tile-grid" class="tile-grid"></div>
  </section>

  <script type="module" src="/editor/editor.js"></script>
</body>
</html>
